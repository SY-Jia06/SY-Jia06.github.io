<!DOCTYPE html>
<html lang="zh-CN">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <meta name="robots" content="noindex">
        <title>博客跳转 | SY-Jia06</title>
        <link rel="canonical" href="https://sy-jia06.github.io/blog/">
        <meta http-equiv="refresh" content="0; url=/blog/">
    </head>
    <body>
        <p>Redirecting to <a href="/blog/">/blog/</a>...</p>
        <script>
            const params = new URLSearchParams(window.location.search);
            const post = params.get("post") || window.location.hash.slice(1);
            if (post) {
                window.location.replace(`/blog/${encodeURIComponent(post)}/`);
            } else {
                window.location.replace(`/blog/${window.location.search}`);
            }
        </script>
    </body>
</html>
