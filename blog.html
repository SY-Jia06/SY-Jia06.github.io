<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="SY-Jia06 的技术博客列表。">
    <title>博客列表 | SY-Jia06</title>
    <script src="theme.js?v=20260329a"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;500;600;700&family=Outfit:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css?v=20260329c">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>

<body>
    <div class="site-loader" id="siteLoader" aria-hidden="true">
        <div class="loader-panel">
            <div class="loader-mark">SY/J</div>
            <div class="loader-track">
                <span class="loader-bar"></span>
            </div>
            <p class="loader-text">Preparing post index and reading view...</p>
        </div>
    </div>

    <nav class="navbar" id="navbar">
        <div class="nav-container">
            <a href="index.html" class="nav-logo">SY/J</a>
            <div class="nav-links">
                <a href="index.html" class="nav-link">首页</a>
                <a href="blog.html" class="nav-link active">博客</a>
                <a href="index.html#page-projects" class="nav-link">项目</a>
                <a href="about.html" class="nav-link">关于</a>
                <div class="theme-switcher" aria-label="Theme switcher">
                    <button type="button" class="theme-btn" data-theme-mode="light">浅</button>
                    <button type="button" class="theme-btn" data-theme-mode="dark">深</button>
                    <button type="button" class="theme-btn" data-theme-mode="system">随</button>
                </div>
                <a href="https://github.com/SY-Jia06" target="_blank" rel="noreferrer" class="nav-link">GitHub</a>
            </div>
            <button class="nav-toggle" id="navToggle" aria-label="Toggle navigation">
                <span></span><span></span><span></span>
            </button>
        </div>
    </nav>

    <div class="mobile-menu" id="mobileMenu">
        <a href="index.html" class="mobile-link">首页</a>
        <a href="blog.html" class="mobile-link">博客</a>
        <a href="index.html#page-projects" class="mobile-link">项目</a>
        <a href="about.html" class="mobile-link">关于</a>
        <div class="theme-switcher theme-switcher-mobile" aria-label="Theme switcher">
            <button type="button" class="theme-btn" data-theme-mode="light">浅色</button>
            <button type="button" class="theme-btn" data-theme-mode="dark">深色</button>
            <button type="button" class="theme-btn" data-theme-mode="system">系统</button>
        </div>
    </div>

    <main>
        <header class="banner-shell compact-banner" id="blogBanner">
            <div class="banner-overlay"></div>
            <div class="banner-inner">
                <p class="banner-kicker">Archive / Tag / Search</p>
                <h1 class="banner-title">博客列表</h1>
                <p class="banner-subtitle">按标题、标签或摘要快速筛选，再进入单篇阅读。</p>
                <div class="banner-toolbar" id="blogTopToolbar"></div>
                <div class="quick-browser" id="quickBrowser" hidden></div>
            </div>
        </header>

        <div class="board-shell board-shell-blog">
            <div class="blog-page-grid" id="blogPageLayout">
                <section class="content-column">
                    <section class="blog-list-shell" id="blogListShell">
                        <div class="panel filter-panel" id="listPanel">
                            <div class="section-heading">
                                <span class="section-eyebrow">Filter</span>
                                <h2>查找博客</h2>
                            </div>
                            <div class="search-row">
                                <input id="searchInput" class="search-input" type="search" placeholder="搜索标题、标签、摘要">
                            </div>
                            <div class="active-filter-bar" id="activeFilterBar"></div>
                            <div class="tag-filter" id="tagFilter"></div>
                        </div>

                        <div class="blog-list" id="blogList"></div>
                    </section>

                    <div class="post-view" id="postView" style="display:none;">
                        <div class="reading-progress" id="readingProgress" hidden>
                            <span class="reading-progress-bar" id="readingProgressBar"></span>
                        </div>
                        <button class="back-btn" id="backBtn">返回博客列表</button>
                        <div class="article-layout article-layout-reading" id="articleLayout">
                            <aside class="article-side article-side-left">
                                <aside class="post-toc" id="postToc" hidden></aside>
                            </aside>

                            <div class="article-main">
                                <section class="post-hero" id="postHero">
                                    <div class="post-hero-overlay"></div>
                                    <div class="post-hero-inner">
                                        <div class="post-hero-meta" id="postMetaHead"></div>
                                        <h1 class="post-hero-title" id="postHeroTitle"></h1>
                                    </div>
                                </section>
                                <article class="post-shell post-shell-reading">
                                    <article class="post-content" id="postContent"></article>
                                    <nav class="post-pagination" id="postPagination" hidden></nav>
                                </article>
                                <section class="post-comments-shell" id="postComments" hidden>
                                    <div class="section-heading section-heading-compact">
                                        <span class="section-eyebrow">Discussion</span>
                                        <h2>评论区</h2>
                                    </div>
                                    <p class="post-comments-setup" id="postCommentsSetup" hidden></p>
                                    <div class="giscus" id="postCommentsEmbed"></div>
                                </section>
                            </div>

                            <aside class="article-side article-side-right">
                                <section class="post-subtoc" id="postSubtoc" hidden></section>
                            </aside>
                        </div>
                    </div>
                </section>
            </div>
        </div>
    </main>

    <footer class="footer">
        <div class="footer-content">
        </div>
    </footer>

    <script src="shared.js?v=20260328b"></script>
    <script src="posts.js?v=20260328b"></script>
    <script src="article-markdown.js?v=20260331a"></script>
    <script src="reading-enhancements.js?v=20260329a"></script>
    <script src="blog-app.js?v=20260331a"></script>
</body>

</html>
